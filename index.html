<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美味しいお店マップ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #1a1a2e;
        }

        /* ===== サイドバー（デスクトップ） ===== */
        #sidebar {
            width: 320px;
            min-width: 320px;
            background: #16213e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,0.4);
            z-index: 10;
        }

        #sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid #0f3460;
        }

        #sidebar-header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #e94560;
            letter-spacing: 0.05em;
        }

        #sidebar-header p {
            font-size: 12px;
            color: #7a8ba0;
            margin-top: 4px;
        }

        #shop-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        #shop-list::-webkit-scrollbar { width: 4px; }
        #shop-list::-webkit-scrollbar-track { background: #16213e; }
        #shop-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

        .shop-item {
            padding: 14px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .shop-item:hover {
            background: rgba(233, 69, 96, 0.1);
            border-left-color: #e94560;
        }

        .shop-item.active {
            background: rgba(233, 69, 96, 0.15);
            border-left-color: #e94560;
        }

        .shop-item .shop-name {
            font-size: 14px;
            font-weight: 500;
            color: #e0e0e0;
        }

        .shop-item .shop-date {
            font-size: 11px;
            color: #7a8ba0;
            margin-top: 4px;
        }

        /* ===== マップ ===== */
        #map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        #loading {
            position: absolute;
            inset: 0;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
            font-size: 14px;
            z-index: 5;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(233,69,96,0.2);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #count-badge {
            display: inline-block;
            background: #e94560;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* ===== ドラッグハンドル（モバイルのみ表示） ===== */
        #drag-handle {
            display: none;
        }

        /* ===== モバイルレイアウト ===== */
        @media (max-width: 640px) {
            body {
                flex-direction: column;
            }

            #map-container {
                position: fixed;
                inset: 0;
            }

            #sidebar {
                width: 100%;
                min-width: 0;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                max-height: 65vh;
                border-radius: 16px 16px 0 0;
                box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
                z-index: 20;
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                transform: translateY(calc(100% - 72px));
            }

            #sidebar.open {
                transform: translateY(0);
            }

            #drag-handle {
                display: flex;
                justify-content: center;
                padding: 10px 0 6px;
                cursor: pointer;
                flex-shrink: 0;
            }

            #drag-handle::before {
                content: '';
                width: 40px;
                height: 4px;
                background: rgba(255,255,255,0.25);
                border-radius: 2px;
            }

            #sidebar-header {
                padding: 8px 20px 14px;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
            }

            #sidebar-header h1 {
                font-size: 16px;
            }

            .shop-item {
                padding: 16px 20px;
            }

            .shop-item .shop-name {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="drag-handle"></div>
        <div id="sidebar-header">
            <h1>🍜 美味しいお店マップ <span id="count-badge">0</span></h1>
            <p>タップでその場所にジャンプ</p>
        </div>
        <div id="shop-list">
            <div style="padding:20px;color:#7a8ba0;font-size:13px;">読み込み中...</div>
        </div>
    </div>

    <div id="map-container">
        <div id="loading">
            <div class="spinner"></div>
            読み込み中...
        </div>
        <div id="map"></div>
    </div>

    <script>
        const SHEET_ID = "1NMCPPC7fK1V2uFklEIiUV43UTmp8VgXs_ZxcrsSMg8Y";
        const API_KEY  = "AIzaSyAbxCb_3w3Ix3EaJkbxSqqtTgLRRmth1z4";

        let map;
        let markers = [];
        let infoWindows = [];
        let activeItem = null;

        const sidebar = document.getElementById('sidebar');
        const COLLAPSED_VISIBLE_PX = 72;
        let sheetIsOpen = false;

        function isMobile() {
            return window.innerWidth <= 640;
        }

        function getMaxOffset() {
            return sidebar.offsetHeight - COLLAPSED_VISIBLE_PX;
        }

        function snapSheet(shouldOpen, animate = true) {
            sheetIsOpen = shouldOpen;
            sidebar.style.transition = animate
                ? 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)'
                : 'none';
            sidebar.style.transform = shouldOpen ? 'translateY(0px)' : `translateY(${getMaxOffset()}px)`;
        }

        function closeSidebar() {
            if (isMobile()) snapSheet(false);
        }

        // ===== ドラッグ操作 =====
        let touchStartY = 0;
        let touchStartOffset = 0;  // ドラッグ開始時の translateY (px)
        let touchCurrentY = 0;
        let touchStartTime = 0;
        let isDraggingSheet = false;

        function onSheetTouchStart(e) {
            if (!isMobile()) return;
            touchStartY = e.touches[0].clientY;
            touchCurrentY = touchStartY;
            touchStartTime = Date.now();
            isDraggingSheet = false;
            // 開閉状態から現在オフセットを決定（CSS calc() に依存しない）
            touchStartOffset = sheetIsOpen ? 0 : getMaxOffset();
            sidebar.style.transition = 'none';
            sidebar.style.transform = `translateY(${touchStartOffset}px)`;
        }

        function onSheetTouchMove(e) {
            if (!isMobile()) return;
            touchCurrentY = e.touches[0].clientY;
            const deltaY = touchCurrentY - touchStartY;

            if (!isDraggingSheet && Math.abs(deltaY) > 8) {
                isDraggingSheet = true;
            }
            if (!isDraggingSheet) return;

            e.preventDefault();
            const newOffset = Math.max(0, Math.min(getMaxOffset(), touchStartOffset + deltaY));
            sidebar.style.transform = `translateY(${newOffset}px)`;
        }

        function onSheetTouchEnd(e) {
            if (!isMobile()) return;

            if (!isDraggingSheet) {
                // タップ → トグル
                snapSheet(!sheetIsOpen);
                e.preventDefault();
                return;
            }

            const deltaY = touchCurrentY - touchStartY;
            const velocity = deltaY / Math.max(1, Date.now() - touchStartTime); // px/ms

            let shouldOpen;
            if (Math.abs(velocity) > 0.4) {
                shouldOpen = velocity < 0; // 上スワイプ → 開く
            } else {
                shouldOpen = (touchStartOffset + deltaY) < getMaxOffset() / 2;
            }
            snapSheet(shouldOpen);
        }

        ['drag-handle', 'sidebar-header'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', onSheetTouchStart, { passive: true });
            el.addEventListener('touchmove', onSheetTouchMove, { passive: false });
            el.addEventListener('touchend', onSheetTouchEnd);
        });

        async function initMap() {
            const res = await fetch(
                `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/main?key=${API_KEY}`
            );
            const data = await res.json();
            const rows = data.values.slice(1);

            const { Map } = await google.maps.importLibrary("maps");
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

            map = new Map(document.getElementById("map"), {
                center: { lat: 35.6433415, lng: 139.6692687 },
                zoom: 12,
                mapId: "your_map_id",
                disableDefaultUI: false,
            });

            document.getElementById("loading").style.display = "none";
            document.getElementById("count-badge").textContent = rows.length;

            const shopList = document.getElementById("shop-list");
            shopList.innerHTML = "";

            rows.forEach(([name, lat, lng, added_at], index) => {
                const position = { lat: parseFloat(lat), lng: parseFloat(lng) };

                const marker = new AdvancedMarkerElement({
                    map,
                    position,
                    title: name,
                });

                const infoWindow = new google.maps.InfoWindow({
                    content: `
                        <div style="font-family:'Noto Sans JP',sans-serif;padding:4px 6px;">
                            <div style="font-weight:700;font-size:14px;margin-bottom:4px;">${name}</div>
                            <div style="font-size:12px;color:#888;">🕐 ${added_at}</div>
                        </div>
                    `
                });

                markers.push(marker);
                infoWindows.push(infoWindow);

                marker.addListener("click", () => {
                    closeAllInfoWindows();
                    infoWindow.open(map, marker);
                    setActiveItem(index);
                    closeSidebar();
                });

                const item = document.createElement("div");
                item.className = "shop-item";
                item.innerHTML = `
                    <div class="shop-name">${name}</div>
                    <div class="shop-date">🕐 ${added_at}</div>
                `;
                item.addEventListener("click", () => {
                    map.panTo(position);
                    map.setZoom(16);
                    closeAllInfoWindows();
                    infoWindow.open(map, marker);
                    setActiveItem(index);
                    closeSidebar();
                });
                item.dataset.index = index;
                shopList.appendChild(item);
            });
        }

        function closeAllInfoWindows() {
            infoWindows.forEach(iw => iw.close());
        }

        function setActiveItem(index) {
            if (activeItem !== null) {
                document.querySelector(`.shop-item[data-index="${activeItem}"]`)?.classList.remove("active");
            }
            document.querySelector(`.shop-item[data-index="${index}"]`)?.classList.add("active");
            activeItem = index;
        }
    </script>

    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbxCb_3w3Ix3EaJkbxSqqtTgLRRmth1z4&callback=initMap"
        async defer>
    </script>
</body>
</html>
