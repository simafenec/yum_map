<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>美味しいお店マップ</title>
    <style>
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        const SHEET_ID  = "1NMCPPC7fK1V2uFklEIiUV43UTmp8VgXs_ZxcrsSMg8Y";
        const API_KEY   = "AIzaSyAbxCb_3w3Ix3EaJkbxSqqtTgLRRmth1z4"; // 読み取り専用に制限すること

        async function initMap() {
            // 1. スプレッドシートからデータ取得
            const res = await fetch(
                `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1?key=${API_KEY}`
            );
            const data = await res.json();
            const rows = data.values.slice(1); // ヘッダー行を除く

            // 2. 地図を初期化
            const { Map } = await google.maps.importLibrary("maps");
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

            const map = new Map(document.getElementById("map"), {
                center: { lat: 35.6433415, lng: 139.6692687 },
                zoom: 12,
                mapId: "your_map_id" // AdvancedMarkerに必要
            });

            // 3. ピンを立てる
            rows.forEach(([name, lat, lng, added_at]) => {
                const marker = new AdvancedMarkerElement({
                    map,
                    position: { lat: parseFloat(lat), lng: parseFloat(lng) },
                    title: name,
                });

                // クリックでポップアップ
                const infoWindow = new google.maps.InfoWindow({
                    content: `
                        <div>
                            <h3>${name}</h3>
                            <p>📍 登録者: ${added_by}</p>
                            <p>🕐 ${added_at}</p>
                        </div>
                    `
                });
                marker.addListener("click", () => {
                    infoWindow.open(map, marker);
                });
            });
        }
    </script>

    <!-- Maps JavaScript API 読み込み -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=${API_KEY}&callback=initMap"
        async defer>
    </script>
</body>
</html>
